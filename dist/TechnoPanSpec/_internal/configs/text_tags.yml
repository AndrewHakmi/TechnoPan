
defaults:
  width_mm: 1190
  thickness_mm: 150
  qty: 1
  panel_type: "ТП СПСК"
  ral_in: "9003"
  metal_out_mm: 0.5
  coating_out: "PE"
  metal_in_mm: 0.5
  coating_in: "PE"

tag_extraction:
  enabled: true
  dwg_load_version: "2018"
  # Две группы: (буква)(номер), напр. "п 612", "П612", "с-598"
  tag_regex: "([пПсСтТcCвВ])\\s*[-]?\\s*(\\d{2,4})"
  # Буква → ширина панели
  prefix_width_map:
    "п": 1190
    "p": 1190
    "с": 1190
    "c": 1190
    "т": 1190
    "t": 1190
    "в": 1000
  default_width_mm: 1190
  # Сопоставление слоёв по префиксу (регистронезависимо)
  # Охватывает: "Нумерация", "Нумерация RAL 7024", "Нумерация 1000" и т.д.
  layer_prefixes:
    - "Нумерация"
  # Извлечение RAL из имени слоя: "Нумерация RAL 7024" → ral_out = "7024"
  layer_ral_regex: "RAL\\s*(\\d+)"
  exclude_layers: []
